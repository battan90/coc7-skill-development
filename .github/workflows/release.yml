name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Set as a repo secret after the package is approved on foundryvtt.com.
      # Until then the publish step below is skipped (no failed builds).
      PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Compile per-document source files into a LevelDB pack under packs/macros.
      - name: Compile compendium packs
        run: |
          npm install --no-save @foundryvtt/foundryvtt-cli
          npx fvtt package pack macros \
            --in src-packs/macros \
            --out packs \
            --id coc7-skill-development \
            --type Module
          echo "--- compiled pack contents ---"
          ls -la packs/macros

      # Pin manifest version + URLs to this release tag.
      - name: Set release version in module.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('module.json', 'utf8'));
            m.version = '${TAG}';
            m.manifest = '${BASE}/module.json';
            m.download = '${BASE}/module.zip';
            fs.writeFileSync('module.json', JSON.stringify(m, null, 2));
          "

      - name: Zip module
        run: |
          zip -r module.zip module.json scripts styles lang packs README.md LICENSE

      - name: Attach assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            module.zip

      # Push this version to the Foundry package registry.
      # Dormant until the PACKAGE_TOKEN secret is set (post-approval).
      - name: Publish to FoundryVTT registry
        if: ${{ env.PACKAGE_TOKEN != '' }}
        uses: cs96and/FoundryVTT-release-package@v1
        with:
          package-token: ${{ secrets.PACKAGE_TOKEN }}
          manifest-url: https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/module.json
